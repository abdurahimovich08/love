services:
  - type: web
    name: love-telegram-bot
    env: node
    plan: free
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm run bot
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: BOT_MODE
        value: webhook
      - key: WEB_APP_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
