<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>E'zoza uchun maxsus</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            },
            colors: {
              love: {
                50: '#fdf2f8',
                100: '#fce7f3',
                200: '#fbcfe8',
                300: '#f9a8d4',
                400: '#f472b6',
                500: '#ec4899',
                600: '#db2777',
                700: '#be185d',
                800: '#9d174d',
                900: '#831843',
              },
              warm: {
                50: '#fff7ed',
                100: '#ffedd5',
                200: '#fed7aa',
                800: '#9a3412',
                900: '#7c2d12',
              }
            },
            animation: {
              'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
              'fade-in': 'fadeIn 0.8s ease-out forwards',
              'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
              'fade-in-down': 'fadeInDown 0.6s ease-out forwards',
              'scale-in': 'scaleIn 0.5s ease-out forwards',
              'float': 'float 3s ease-in-out infinite',
              'pulse-soft': 'pulseSoft 2s ease-in-out infinite',
              'bounce-soft': 'bounceSoft 2s ease-in-out infinite',
              'spin-slow': 'spin 8s linear infinite',
              'heart-beat': 'heartBeat 1.2s ease-in-out infinite',
              'slide-left': 'slideLeft 0.3s ease-out',
              'slide-right': 'slideRight 0.3s ease-out',
              'confetti-fall': 'confettiFall 3s ease-out forwards',
              'sparkle': 'sparkle 1.5s ease-in-out infinite',
            },
            keyframes: {
              shake: {
                '10%, 90%': { transform: 'translate3d(-2px, 0, 0)' },
                '20%, 80%': { transform: 'translate3d(3px, 0, 0)' },
                '30%, 50%, 70%': { transform: 'translate3d(-5px, 0, 0)' },
                '40%, 60%': { transform: 'translate3d(5px, 0, 0)' }
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(30px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              fadeInDown: {
                '0%': { opacity: '0', transform: 'translateY(-20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              scaleIn: {
                '0%': { opacity: '0', transform: 'scale(0.8)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              pulseSoft: {
                '0%, 100%': { opacity: '1' },
                '50%': { opacity: '0.7' },
              },
              bounceSoft: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-5px)' },
              },
              heartBeat: {
                '0%': { transform: 'scale(1)' },
                '14%': { transform: 'scale(1.15)' },
                '28%': { transform: 'scale(1)' },
                '42%': { transform: 'scale(1.15)' },
                '70%': { transform: 'scale(1)' },
              },
              slideLeft: {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(-100vw)' },
              },
              slideRight: {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(100vw)' },
              },
              confettiFall: {
                '0%': { transform: 'translateY(-100vh) rotate(0deg)', opacity: '1' },
                '100%': { transform: 'translateY(100vh) rotate(720deg)', opacity: '0' },
              },
              sparkle: {
                '0%, 100%': { opacity: '0', transform: 'scale(0)' },
                '50%': { opacity: '1', transform: 'scale(1)' },
              },
            }
          }
        }
      }
    </script>
    <style>
      * {
        -webkit-tap-highlight-color: transparent;
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      ::-webkit-scrollbar {
        width: 0;
        display: none;
      }
      .bg-gradient-love {
        background: linear-gradient(135deg, #fdf2f8 0%, #fce7f3 30%, #fff1f2 60%, #fff7ed 100%);
      }
      .bg-gradient-card {
        background: linear-gradient(145deg, rgba(255,255,255,0.9) 0%, rgba(253,242,248,0.9) 100%);
        backdrop-filter: blur(10px);
      }
      .text-gradient-love {
        background: linear-gradient(135deg, #ec4899, #f43f5e, #ef4444);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .btn-gradient-love {
        background: linear-gradient(135deg, #ec4899 0%, #f43f5e 50%, #ef4444 100%);
      }
      .btn-gradient-love:hover {
        background: linear-gradient(135deg, #db2777 0%, #e11d48 50%, #dc2626 100%);
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.75);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
      }
      .shadow-love {
        box-shadow: 0 8px 32px rgba(236, 72, 153, 0.15), 0 2px 8px rgba(0,0,0,0.05);
      }
      .shadow-love-lg {
        box-shadow: 0 16px 48px rgba(236, 72, 153, 0.2), 0 4px 16px rgba(0,0,0,0.08);
      }
      @keyframes floatHeart {
        0% { transform: translateY(100vh) scale(0) rotate(0deg); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translateY(-20vh) scale(1) rotate(45deg); opacity: 0; }
      }
      .floating-heart {
        position: fixed;
        pointer-events: none;
        z-index: 0;
        animation: floatHeart var(--duration) ease-out infinite;
        animation-delay: var(--delay);
        left: var(--left);
        font-size: var(--size);
        opacity: 0;
      }

      /* Sea / fishing game animations */
      @keyframes seaWave {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(-15px); }
      }
      @keyframes pearlFloat {
        0%, 100% { transform: translateY(0) translateX(0); }
        25% { transform: translateY(-4px) translateX(3px); }
        75% { transform: translateY(3px) translateX(-3px); }
      }
      @keyframes pearlGlow {
        0%, 100% { box-shadow: 0 0 8px rgba(236,72,153,0.3); }
        50% { box-shadow: 0 0 18px rgba(236,72,153,0.6); }
      }
      @keyframes hookSwing {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(3deg); }
        75% { transform: rotate(-3deg); }
      }
      @keyframes pearlCatch {
        0% { transform: scale(1); }
        30% { transform: scale(1.2); }
        100% { transform: scale(0) translateY(-80px); opacity: 0; }
      }
      @keyframes shipRock {
        0%, 100% { transform: rotate(0deg) translateY(0); }
        25% { transform: rotate(2deg) translateY(-2px); }
        75% { transform: rotate(-2deg) translateY(1px); }
      }
      @keyframes toastIn {
        0% { transform: translateY(20px); opacity: 0; }
        100% { transform: translateY(0); opacity: 1; }
      }
      @keyframes toastOut {
        0% { transform: translateY(0); opacity: 1; }
        100% { transform: translateY(20px); opacity: 0; }
      }
      @keyframes bubbleRise {
        0% { transform: translateY(0) scale(1); opacity: 0.6; }
        100% { transform: translateY(-40px) scale(0.3); opacity: 0; }
      }

      /* Character game — card & mirror animations */
      .card-scene {
        perspective: 700px;
      }
      .card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        transform-style: preserve-3d;
      }
      .card-inner.flipped {
        transform: rotateY(180deg);
      }
      .card-face {
        position: absolute;
        inset: 0;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        border-radius: 1rem;
        overflow: hidden;
      }
      .card-face-back {
        transform: rotateY(180deg);
      }
      @keyframes mirrorGlow {
        0%, 100% { box-shadow: 0 0 20px rgba(236,72,153,0.2), 0 0 40px rgba(236,72,153,0.1); }
        50% { box-shadow: 0 0 30px rgba(236,72,153,0.4), 0 0 60px rgba(236,72,153,0.2), 0 0 80px rgba(139,92,246,0.1); }
      }
      @keyframes mirrorReveal {
        0% { box-shadow: 0 0 20px rgba(236,72,153,0.2); transform: scale(1); }
        50% { box-shadow: 0 0 50px rgba(236,72,153,0.5), 0 0 100px rgba(139,92,246,0.3); transform: scale(1.02); }
        100% { box-shadow: 0 0 35px rgba(236,72,153,0.3); transform: scale(1); }
      }
      @keyframes traitReveal {
        0% { opacity: 0; transform: scale(0.5) translateY(10px); }
        60% { opacity: 1; transform: scale(1.15) translateY(-2px); }
        100% { opacity: 1; transform: scale(1) translateY(0); }
      }
      @keyframes archetypeReveal {
        0% { opacity: 0; transform: scale(0) rotate(-10deg); }
        50% { transform: scale(1.1) rotate(2deg); }
        100% { opacity: 1; transform: scale(1) rotate(0deg); }
      }
      @keyframes choiceFly {
        0% { opacity: 1; transform: scale(1) translate(0, 0); }
        100% { opacity: 0; transform: scale(0.3) translate(var(--fly-x, 0px), var(--fly-y, -80px)); }
      }
      @keyframes cardLock {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(0.95); }
      }
      @keyframes progressFill {
        from { width: 0; }
      }
      @keyframes emojiPop {
        0% { transform: scale(0); }
        60% { transform: scale(1.3); }
        100% { transform: scale(1); }
      }

      /* Premium intro animations */
      @keyframes introGradient {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      @keyframes petalDrift {
        0% { transform: translate(0, -20px) rotate(0deg) scale(0); opacity: 0; }
        10% { opacity: 1; transform: translate(0, 0) rotate(15deg) scale(1); }
        90% { opacity: 0.8; }
        100% { transform: translate(var(--drift-x, 30px), var(--drift-y, 200px)) rotate(var(--drift-rot, 180deg)) scale(0.4); opacity: 0; }
      }
      @keyframes heartPulseRing {
        0% { transform: scale(0.8); opacity: 0.6; box-shadow: 0 0 0 0 rgba(236,72,153,0.4); }
        50% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 12px rgba(236,72,153,0); }
        100% { transform: scale(0.8); opacity: 0.6; box-shadow: 0 0 0 0 rgba(236,72,153,0); }
      }
      @keyframes typewriter {
        0% { width: 0; opacity: 1; }
        100% { width: 100%; opacity: 1; }
      }
      @keyframes introTextReveal {
        0% { opacity: 0; transform: translateY(15px); filter: blur(4px); }
        100% { opacity: 1; transform: translateY(0); filter: blur(0px); }
      }
      @keyframes introButtonGlow {
        0%, 100% { box-shadow: 0 0 20px rgba(236,72,153,0.3), 0 8px 32px rgba(236,72,153,0.15); }
        50% { box-shadow: 0 0 35px rgba(236,72,153,0.5), 0 8px 48px rgba(236,72,153,0.25), 0 0 60px rgba(244,63,94,0.15); }
      }
      @keyframes introHeartFloat {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        25% { transform: translateY(-8px) rotate(3deg); }
        75% { transform: translateY(4px) rotate(-2deg); }
      }
      @keyframes softBreathe {
        0%, 100% { transform: scale(1); opacity: 0.12; }
        50% { transform: scale(1.15); opacity: 0.2; }
      }
      @keyframes lineExpand {
        0% { transform: scaleX(0); }
        100% { transform: scaleX(1); }
      }

      /* Favorites shop animations */
      @keyframes shelfSlideIn {
        0% { opacity: 0; transform: translateY(20px) scale(0.9); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }
      @keyframes itemToCart {
        0% { transform: translate(0, 0) scale(1); opacity: 1; }
        50% { transform: translate(var(--cart-x, 80px), var(--cart-y, -40px)) scale(0.6); opacity: 0.8; }
        100% { transform: translate(var(--cart-x, 80px), var(--cart-y, -40px)) scale(0); opacity: 0; }
      }
      @keyframes cartBounce {
        0%, 100% { transform: scale(1); }
        40% { transform: scale(1.25); }
        70% { transform: scale(0.92); }
      }
      @keyframes sheetUp {
        0% { transform: translateY(100%); }
        100% { transform: translateY(0); }
      }
      @keyframes sheetDown {
        0% { transform: translateY(0); }
        100% { transform: translateY(100%); }
      }
      @keyframes itemFlyToBox {
        0% { transform: translate(var(--start-x, 0px), var(--start-y, 0px)) scale(1) rotate(0deg); opacity: 1; filter: brightness(1.2); }
        40% { transform: translate(calc(var(--start-x, 0px) * 0.3), calc(var(--start-y, 0px) * 0.3 - 40px)) scale(1.3) rotate(15deg); opacity: 1; filter: brightness(1.4); }
        100% { transform: translate(0, 10px) scale(0.3) rotate(0deg); opacity: 0; filter: brightness(1); }
      }
      @keyframes itemLabel {
        0% { opacity: 0; transform: translateY(5px); }
        20% { opacity: 1; transform: translateY(0); }
        70% { opacity: 1; transform: translateY(0); }
        100% { opacity: 0; transform: translateY(-10px) scale(0.8); }
      }
      @keyframes boxLidOpen {
        0% { transform: perspective(400px) rotateX(0deg); }
        100% { transform: perspective(400px) rotateX(-130deg); }
      }
      @keyframes boxLidClose {
        0% { transform: perspective(400px) rotateX(-130deg); }
        40% { transform: perspective(400px) rotateX(5deg); }
        60% { transform: perspective(400px) rotateX(-8deg); }
        80% { transform: perspective(400px) rotateX(2deg); }
        100% { transform: perspective(400px) rotateX(0deg); }
      }
      @keyframes ribbonAppear {
        0% { transform: scaleX(0) scaleY(0); opacity: 0; }
        40% { transform: scaleX(1.15) scaleY(1.15); opacity: 1; }
        70% { transform: scaleX(0.95) scaleY(0.95); }
        100% { transform: scaleX(1) scaleY(1); opacity: 1; }
      }
      @keyframes ribbonVertical {
        0% { transform: scaleY(0); opacity: 0; }
        100% { transform: scaleY(1); opacity: 1; }
      }
      @keyframes ribbonHorizontal {
        0% { transform: scaleX(0); opacity: 0; }
        100% { transform: scaleX(1); opacity: 1; }
      }
      @keyframes giftShake {
        0%, 100% { transform: rotate(0deg) scale(1); }
        10% { transform: rotate(4deg) scale(1.02); }
        20% { transform: rotate(-4deg) scale(1.02); }
        30% { transform: rotate(3deg) scale(1.01); }
        40% { transform: rotate(-2deg) scale(1.01); }
        50% { transform: rotate(1deg) scale(1); }
        60% { transform: rotate(0deg) scale(1); }
      }
      @keyframes giftGlow {
        0%, 100% { filter: drop-shadow(0 0 12px rgba(236,72,153,0.2)) drop-shadow(0 0 24px rgba(236,72,153,0.1)); }
        50% { filter: drop-shadow(0 0 20px rgba(236,72,153,0.4)) drop-shadow(0 0 40px rgba(236,72,153,0.25)) drop-shadow(0 0 60px rgba(139,92,246,0.15)); }
      }
      @keyframes boxAppear {
        0% { transform: scale(0.5) translateY(30px); opacity: 0; }
        60% { transform: scale(1.05) translateY(-5px); opacity: 1; }
        100% { transform: scale(1) translateY(0); opacity: 1; }
      }
      @keyframes sparkleOrbit {
        0% { transform: rotate(0deg) translateX(var(--orbit-r, 70px)) rotate(0deg) scale(0); opacity: 0; }
        15% { opacity: 1; transform: rotate(0deg) translateX(var(--orbit-r, 70px)) rotate(0deg) scale(1); }
        85% { opacity: 1; }
        100% { transform: rotate(360deg) translateX(var(--orbit-r, 70px)) rotate(-360deg) scale(0); opacity: 0; }
      }
      @keyframes confettiBurst {
        0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
        100% { transform: translate(var(--burst-x, 50px), var(--burst-y, -80px)) scale(0) rotate(var(--burst-rot, 360deg)); opacity: 0; }
      }
      @keyframes giftReveal {
        0% { transform: scale(1); }
        15% { transform: scale(1.12); }
        30% { transform: scale(0.95); }
        45% { transform: scale(1.06); }
        60% { transform: scale(0.98); }
        100% { transform: scale(1); }
      }
      @keyframes progressGlow {
        0% { box-shadow: none; }
        50% { box-shadow: 0 0 8px rgba(236,72,153,0.5); }
        100% { box-shadow: none; }
      }

      /* Dreams sky animations */
      @keyframes shootingStar {
        0% { transform: translate(0, 0) scale(1); opacity: 0; }
        5% { opacity: 1; }
        70% { opacity: 1; }
        100% { transform: translate(calc(100vw + 80px), 60px) scale(0.6); opacity: 0; }
      }
      @keyframes shootingStarReverse {
        0% { transform: translate(0, 0) scale(1); opacity: 0; }
        5% { opacity: 1; }
        70% { opacity: 1; }
        100% { transform: translate(calc(-100vw - 80px), 50px) scale(0.6); opacity: 0; }
      }
      @keyframes starDescend {
        0% { transform: translate(var(--from-x, 0px), var(--from-y, -100px)) scale(1.2); opacity: 1; }
        100% { transform: translate(0, 0) scale(1); opacity: 1; }
      }
      @keyframes starAscend {
        0% { transform: translate(0, 0) scale(1); opacity: 1; }
        60% { opacity: 1; }
        100% { transform: translate(var(--to-x, 0px), var(--to-y, -200px)) scale(0.5); opacity: 0.9; }
      }
      @keyframes starSettle {
        0% { transform: scale(0); opacity: 0; }
        50% { transform: scale(1.6); opacity: 1; }
        75% { transform: scale(0.85); }
        100% { transform: scale(1); opacity: 1; }
      }
      @keyframes starTwinkle {
        0%, 100% { opacity: var(--base-opacity, 0.4); transform: scale(1); }
        50% { opacity: 1; transform: scale(1.2); }
      }
      @keyframes starGlow {
        0%, 100% { box-shadow: 0 0 6px var(--glow-color, rgba(251,191,36,0.4)), 0 0 15px var(--glow-color, rgba(251,191,36,0.2)); }
        50% { box-shadow: 0 0 12px var(--glow-color, rgba(251,191,36,0.7)), 0 0 30px var(--glow-color, rgba(251,191,36,0.3)), 0 0 50px var(--glow-color, rgba(251,191,36,0.15)); }
      }
      @keyframes starGlowText {
        0%, 100% { text-shadow: 0 0 6px var(--glow-color, rgba(251,191,36,0.5)); }
        50% { text-shadow: 0 0 14px var(--glow-color, rgba(251,191,36,0.9)), 0 0 28px var(--glow-color, rgba(251,191,36,0.4)); }
      }
      @keyframes wishFadeIn {
        0% { opacity: 0; transform: translateY(30px) scale(0.95); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }
      @keyframes moonGlow {
        0%, 100% { filter: drop-shadow(0 0 15px rgba(251,191,36,0.3)); }
        50% { filter: drop-shadow(0 0 25px rgba(251,191,36,0.5)) drop-shadow(0 0 50px rgba(251,191,36,0.15)); }
      }
      @keyframes wishPulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes skyBrighten {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }
      @keyframes trailFade {
        0% { opacity: 0.8; width: 60px; }
        100% { opacity: 0; width: 0px; }
      }
      @keyframes finalGlow {
        0% { opacity: 0; transform: scale(0.8); }
        50% { transform: scale(1.1); }
        100% { opacity: 1; transform: scale(1); }
      }

      /* Car animations */
      @keyframes carBounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-3px); }
      }
      @keyframes carIdle {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-1.5px); }
      }
      @keyframes wheelSpin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes roadDash {
        0% { transform: translateX(0); }
        100% { transform: translateX(-48px); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
